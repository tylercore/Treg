name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    uses: ./.github/workflows/_verify.yml
    with:
      node-version: "20"

  publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # npm trusted publishing requires Node >= 22.14
          node-version: 24
          cache: pnpm

      - name: Show Node and npm versions
        run: |
          node -v
          npm -v

      - name: Clear legacy npm auth token config
        run: |
          npm config delete //registry.npmjs.org/:_authToken || true
          rm -f "$HOME/.npmrc" ".npmrc"

      - name: Verify tag matches package version
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$package_version" != "$tag_version" ]; then
            echo "Tag version ($tag_version) does not match package.json version ($package_version)."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Build package
        run: pnpm build

      - name: Use npm-specific README
        run: cp README.npm.md README.md

      - name: Verify OIDC token environment
        run: |
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "OIDC token env is missing. Check `permissions.id-token: write` and runner type."
            exit 1
          fi

      - name: Publish to npm (Trusted publishing)
        run: npm publish --registry https://registry.npmjs.org --access public --provenance --ignore-scripts
