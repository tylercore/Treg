name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    uses: ./.github/workflows/_verify.yml
    with:
      node-version: "20"

  publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Ensure modern npm
        run: npm install -g npm@latest

      - name: Clear legacy npm auth token config
        run: |
          npm config delete //registry.npmjs.org/:_authToken || true
          rm -f "$HOME/.npmrc"

      - name: Validate release tag format
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          if ! [[ "$tag_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?([+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag version: $tag_version"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Sync package version from tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          npm version "$tag_version" --no-git-tag-version --allow-same-version

      - name: Build package
        run: pnpm build

      - name: Publish to npm (Trusted publishing)
        run: npm publish --registry https://registry.npmjs.org --access public --provenance --ignore-scripts
