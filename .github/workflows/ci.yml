name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  validate:
    name: Validate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Check format
        run: pnpm format:check

      - name: Check lint
        run: pnpm lint:check

      - name: Check types
        run: pnpm type-check

      - name: Build (TS to JS)
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: CLI smoke test (dry run)
        run: |
          tmpdir="$(mktemp -d)"
          cat > "$tmpdir/package.json" <<'JSON'
          { "name": "ci-smoke", "version": "1.0.0" }
          JSON
          node dist/init-project.js init --dir "$tmpdir" --framework node --dry-run
